<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCU Chronological Watchlist</title>

<style>
:root{
  --bg:#0a0a0e;
  --card:#161a23;
  --card-hover:#1e2530;
  --text:#f8fafc;
  --text-secondary:#94a3b8;
  --accent:#ff1a47;
  --gradient:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; }

body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color:var(--text);
}

header{
  padding:24px 20px;
  background: var(--gradient);
  font-size:28px;
  font-weight:800;
  text-align:center;
  box-shadow:var(--shadow);
}

.top-bar{
  padding:20px;
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:10;
}

.search-container {
  max-width:600px;
  margin:0 auto;
}

#search{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:var(--text);
  font-size:16px;
}

#progress{
  text-align:center;
  margin-top:10px;
  color:var(--text-secondary);
}

.container{
  padding:20px;
  max-width:800px;
  margin:0 auto;
}

.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--card);
  padding:18px;
  border-radius:16px;
  margin-bottom:12px;
  transition:0.3s;
}

.card:hover{
  background:var(--card-hover);
  cursor: pointer;
}

.title{
  font-size:18px;
  font-weight:700;
}

/* ✅ NUMBER STYLE - COLOR VARIES BY TAB */
.num {
  font-weight: 800;
  margin-right:6px;
  text-shadow: 0 0 4px rgba(255,59,48,0.5);
}

/* Tab-specific number colors */
#list[data-tab="chronological"] .num {
  color: #ff3b30;
  text-shadow: 0 0 4px rgba(255,59,48,0.5);
}

#list[data-tab="releaseOrder"] .num {
  color: #00b4db;
  text-shadow: 0 0 4px rgba(0,180,219,0.5);
}

#list[data-tab="upcoming"] .num {
  color: #ffa500;
  text-shadow: 0 0 4px rgba(255,165,0,0.5);
}

.title a{
  color:inherit;
  text-decoration:none;
}

.title a:hover{
  text-decoration:underline;
}

.meta{
  font-size:13px;
  color:var(--text-secondary);
  margin-top:4px;
}

.rating{
  font-size:14px;
  margin-top:4px;
  color:var(--text-secondary);
}

.checkbox{
  width:22px;
  height:22px;
  accent-color: var(--accent);
  cursor:pointer;
}

.tabs-container{
  display:flex;
  gap:8px;
  margin-bottom:20px;
  flex-wrap:wrap;
  padding:0 20px;
}

.tab{
  padding:10px 10px;
  border:none;
  border-radius:8px;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
  border-bottom:3px solid transparent;
}

.tab:hover{
  background:var(--card-hover);
}

.tab.active{
  color:#fff;
  border-bottom-color:#ff3b30;
  background:var(--card-hover);
}

.tab.release-order{
  --tab-color:#00b4db;
}

.tab.release-order.active{
  border-bottom-color:#00b4db;
  box-shadow:0 0 8px rgba(0,180,219,0.3);
}

.tab.upcoming{
  --tab-color:#ffa500;
}

.tab.upcoming.active{
  border-bottom-color:#ffa500;
  box-shadow:0 0 8px rgba(255,165,0,0.3);
}

.tab.chronological{
  --tab-color:#ff3b30;
}

.tab.chronological.active{
  border-bottom-color:#ff3b30;
  box-shadow:0 0 8px rgba(255,59,48,0.3);
}
</style>
</head>

<body>

<header>MCU Chronological Watchlist</header>

<div class="top-bar">
  <div class="tabs-container" id="tabs"></div>
  <div class="search-container">
    <input type="text" id="search" placeholder="Search MCU movies...">
  </div>
  <div id="progress">Loading...</div>
</div>

<div class="container" id="list"></div>

<script>
const SHEET_IDS = {
  chronological: "https://docs.google.com/spreadsheets/d/1Xfe--9Wshbb3ru0JplA2PnEwN7mVawazKmhWJjr_wKs/gviz/tq?tqx=out:json&sheet=Chronological%20Order",
  releaseOrder: "https://docs.google.com/spreadsheets/d/1Xfe--9Wshbb3ru0JplA2PnEwN7mVawazKmhWJjr_wKs/gviz/tq?tqx=out:json&sheet=Release%20Order",
  upcoming: "https://docs.google.com/spreadsheets/d/1Xfe--9Wshbb3ru0JplA2PnEwN7mVawazKmhWJjr_wKs/gviz/tq?tqx=out:json&sheet=Upcoming"
};

const TAB_CONFIG = [
  { id: 'chronological', label: 'Chronological Order', className: 'chronological' },
  { id: 'releaseOrder', label: 'Release Order', className: 'release-order' },
  { id: 'upcoming', label: 'Upcoming', className: 'upcoming' }
];

const TMDB_KEY = "aca5177e4921fcdcb0ece67dc17b5bd0";

let watched = JSON.parse(localStorage.getItem("watched") || "{}");
let ratingCache = JSON.parse(localStorage.getItem("ratingCache") || "{}");
let imdbCache = JSON.parse(localStorage.getItem("imdbCache") || "{}");
let allItems = [];
let currentTab = 'chronological';
let sheetCache = {}; // Cache sheet data by tab
/* Fetch Google Sheet */
async function fetchSheet(sheetUrl){
  const res = await fetch(sheetUrl);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));

  const isReleaseOrder = sheetUrl.includes("Release%20Order");
  const startIndex = isReleaseOrder ? 1 : 0;

  return json.table.rows
    .slice(startIndex)
    .map((r, i) => {
      const titleCell = r.c[1];
      const dateCell = r.c[2];

      let title = titleCell?.v?.toString().trim();
      let link = null;

      if(titleCell?.f){
        const html = titleCell.f;

        const match = html.match(/href="([^"]+)"/);
        if(match && match[1]){
          link = match[1];
        }

        if(!link){
          const urlMatch = html.match(/https?:\/\/[^\s"]+/);
          if(urlMatch) link = urlMatch[0];
        }
      }

      let date = dateCell?.v;

      if(dateCell && dateCell.f){
        date = dateCell.f;
      }

      if(title){
        return { 
          title, 
          date, 
          link,
          index: i + 1
        };
      }
    })
    .filter(Boolean);
}

/* IMDb search link */
function getImdbSearchLink(title){
  return `https://www.imdb.com/find?q=${encodeURIComponent(title)}&s=tt&ttype=ft`;
}

/* Format date */
function formatDate(date){
  if(!date) return "Unknown";

  let d;

  if(typeof date === "string"){
    d = new Date(date);
  } else if(typeof date === "number"){
    d = new Date(Math.round((date - 25569) * 86400 * 1000));
  }

  if(!d || isNaN(d)) return "Unknown";

  const day = d.getDate();
  const month = d.getMonth() + 1;
  const year = d.getFullYear();

  return `${day} - ${month} - ${year}`;
}

/* Extract show name from episode title (e.g., "Show Name Season 1 Episode 1" -> "Show Name") */
function getShowName(title){
  return title.split(/Season \d+/i)[0].trim();
}

/* Check if title is a TV episode */
function isEpisode(title){
  return /Season \d+.*Episode \d+/i.test(title);
}

/* Parse season and episode numbers from title */
function parseEpisodeInfo(title){
  const match = title.match(/Season\s+(\d+)\s+Episode\s+(\d+)/i);
  if(match){
    return { season: parseInt(match[1]), episode: parseInt(match[2]) };
  }
  return null;
}

/* IMDb link from TMDB - handles movies and episodes */
async function getImdbLink(title){
  if(imdbCache[title]){
    return imdbCache[title];
  }

  try{
    if(isEpisode(title)){
      // Get episode-specific IMDb ID
      const showName = getShowName(title);
      const episodeInfo = parseEpisodeInfo(title);
      
      // Search for the TV show
      const searchRes = await fetch(`https://api.themoviedb.org/3/search/tv?query=${encodeURIComponent(showName)}&api_key=${TMDB_KEY}`);
      const searchData = await searchRes.json();
      
      if(searchData.results && searchData.results.length > 0){
        const tvShowId = searchData.results[0].id;
        
        // Get the episode's external IDs (including IMDb ID)
        const episodeRes = await fetch(`https://api.themoviedb.org/3/tv/${tvShowId}/season/${episodeInfo.season}/episode/${episodeInfo.episode}/external_ids?api_key=${TMDB_KEY}`);
        const episodeData = await episodeRes.json();
        
        if(episodeData.imdb_id){
          const link = `https://www.imdb.com/title/${episodeData.imdb_id}/`;
          imdbCache[title] = link;
          localStorage.setItem("imdbCache", JSON.stringify(imdbCache));
          console.log(`Found episode IMDb link: ${link}`);
          return link;
        }
      }
    } else {
      // Get movie IMDb ID
      const searchRes = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(title)}&api_key=${TMDB_KEY}`);
      const searchData = await searchRes.json();
      
      if(searchData.results && searchData.results.length > 0){
        const movieId = searchData.results[0].id;
        
        const movieRes = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${TMDB_KEY}&append_to_response=external_ids`);
        const movieData = await movieRes.json();
        
        if(movieData.external_ids && movieData.external_ids.imdb_id){
          const link = `https://www.imdb.com/title/${movieData.external_ids.imdb_id}/`;
          imdbCache[title] = link;
          localStorage.setItem("imdbCache", JSON.stringify(imdbCache));
          return link;
        }
      }
    }
    
    return null;
  } catch(err){
    console.error(`Error fetching IMDb link for "${title}":`, err);
    return null;
  }
}

/* TMDB rating */
async function getRating(title){
  if(ratingCache[title]){
    return ratingCache[title];
  }

  try{
    const searchTitle = isEpisode(title) ? getShowName(title) : title;
    const mediaType = isEpisode(title) ? 'tv' : 'movie';
    
    const res = await fetch(`https://api.themoviedb.org/3/search/${mediaType}?query=${encodeURIComponent(searchTitle)}&api_key=${TMDB_KEY}`);
    const data = await res.json();

    let rating = "N/A";

    if(data.results && data.results.length > 0){
      const item = data.results[0];
      // For TV shows, use the show's rating; for episodes, also use show rating
      if(item.vote_average && item.vote_average > 0){
        rating = (item.vote_average / 2).toFixed(1);
      }
    }

    ratingCache[title] = rating;
    localStorage.setItem("ratingCache", JSON.stringify(ratingCache));

    return rating;
  } catch(err){
    console.error(err);
    return "N/A";
  }
}

/* Render list */
function renderList(items){
  const container = document.getElementById("list");
  
  // Set tab data attribute for color styling
  container.setAttribute('data-tab', currentTab);
  container.innerHTML = "";

  items.forEach(async (item) => {
    const { title, date, link, index } = item;

    const card = document.createElement("div");
    card.className = "card";

    const titleHTML = link
      ? `<a href="${link}" target="_blank">${title}</a>`
      : title;

    card.innerHTML = `
      <div>
        <div class="title">
          <span class="num">#${index}</span> ${titleHTML}
        </div>
        <div class="meta">📅 ${formatDate(date)}</div>
        <div class="rating">⭐ Loading...</div>
      </div>
      <input type="checkbox" class="checkbox" ${watched[title] ? "checked" : ""}>
    `;

    container.appendChild(card);

    const rating = await getRating(title);
    card.querySelector(".rating").innerText = `⭐ ${rating}`;

    const checkbox = card.querySelector("input");
    checkbox.addEventListener("change", () => {
      watched[title] = checkbox.checked;
      localStorage.setItem("watched", JSON.stringify(watched));
      updateProgress();
    });

    // Click card to open IMDb link
    card.addEventListener("click", async (e) => {
      // Don't trigger if clicking checkbox
      if(e.target === checkbox) return;

      const imdbLink = await getImdbLink(title);
      if(imdbLink){
        window.open(imdbLink, "_blank");
      } else {
        alert("Could not find IMDb link for: " + title);
      }
    });
  });

  updateProgress();
}

/* Progress */
function updateProgress(){
  const total = allItems.length;
  const watchedCount = allItems.filter(i => watched[i.title]).length;

  document.getElementById("progress").innerHTML =
    `Watched: <strong>${watchedCount}/${total}</strong>`;
}

/* Search */
function setupSearch(){
  const search = document.getElementById("search");

  search.addEventListener("input", () => {
    const q = search.value.toLowerCase();
    const filtered = allItems.filter(i =>
      i.title.toLowerCase().includes(q)
    );
    renderList(filtered);
  });
}

/* Setup tabs */
function setupTabs(){
  const tabsContainer = document.getElementById("tabs");
  tabsContainer.innerHTML = "";

  TAB_CONFIG.forEach(tab => {
    const button = document.createElement("button");
    button.className = `tab ${tab.className}`;
    button.textContent = tab.label;
    
    if(tab.id === currentTab){
      button.classList.add("active");
    }

    button.addEventListener("click", () => switchTab(tab.id));
    tabsContainer.appendChild(button);
  });
}

/* Switch tab */
async function switchTab(tabId){
  currentTab = tabId;
  document.getElementById("search").value = "";
  
  // Clear rating cache when switching tabs so fresh ratings are fetched
  ratingCache = {};
  localStorage.setItem("ratingCache", JSON.stringify(ratingCache));
  
  setupTabs();
  
  // Use cached data if available, otherwise fetch
  if(sheetCache[tabId]){
    allItems = sheetCache[tabId];
    renderList(allItems);
  } else {
    const sheetUrl = SHEET_IDS[tabId];
    allItems = await fetchSheet(sheetUrl);
    sheetCache[tabId] = allItems; // Cache for next time
    renderList(allItems);
  }
}

/* Init */
async function load(){
  setupTabs();
  const sheetUrl = SHEET_IDS[currentTab];
  allItems = await fetchSheet(sheetUrl);
  renderList(allItems);
  setupSearch();
}

load();
</script>

</body>
</html>
