<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCU Chronological Watchlist</title>

<style>
:root{
  --bg:#0a0a0e;
  --card:#161a23;
  --card-hover:#1e2530;
  --text:#f8fafc;
  --text-secondary:#94a3b8;
  --accent:#ff1a47;
  --gradient:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; }

body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color:var(--text);
}

header{
  padding:24px 20px;
  background: var(--gradient);
  font-size:28px;
  font-weight:800;
  text-align:center;
  box-shadow:var(--shadow);
}

.top-bar{
  padding:20px;
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:10;
}

.search-container {
  max-width:600px;
  margin:0 auto;
}

#search{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:var(--text);
  font-size:16px;
}

#progress{
  text-align:center;
  margin-top:10px;
  color:var(--text-secondary);
}

.container{
  padding:20px;
  max-width:800px;
  margin:0 auto;
}

.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--card);
  padding:18px;
  border-radius:16px;
  margin-bottom:12px;
  transition:0.3s;
}

.card:hover{
  background:var(--card-hover);
}

.title{
  font-size:18px;
  font-weight:700;
}

/* ✅ RED NUMBER STYLE */
.num {
  color: #ff3b30;
  font-weight: 800;
  margin-right:6px;
  text-shadow: 0 0 4px rgba(255,59,48,0.5);
}

.title a{
  color:inherit;
  text-decoration:none;
}

.title a:hover{
  text-decoration:underline;
}

.meta{
  font-size:13px;
  color:var(--text-secondary);
  margin-top:4px;
}

.rating{
  font-size:14px;
  margin-top:4px;
  color:var(--text-secondary);
}

.checkbox{
  width:22px;
  height:22px;
  accent-color: var(--accent);
  cursor:pointer;
}

.tabs-container{
  display:flex;
  gap:8px;
  margin-bottom:20px;
  flex-wrap:wrap;
  padding:0 20px;
}

.tab{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
  border-bottom:3px solid transparent;
}

.tab:hover{
  background:var(--card-hover);
}

.tab.active{
  color:#fff;
  border-bottom-color:#ff3b30;
  background:var(--card-hover);
}

.tab.release-order{
  --tab-color:#00b4db;
}

.tab.release-order.active{
  border-bottom-color:#00b4db;
  box-shadow:0 0 8px rgba(0,180,219,0.3);
}

.tab.upcoming{
  --tab-color:#ffa500;
}

.tab.upcoming.active{
  border-bottom-color:#ffa500;
  box-shadow:0 0 8px rgba(255,165,0,0.3);
}

.tab.chronological{
  --tab-color:#ff3b30;
}

.tab.chronological.active{
  border-bottom-color:#ff3b30;
  box-shadow:0 0 8px rgba(255,59,48,0.3);
}
</style>
</head>

<body>

<header>MCU Chronological Watchlist</header>

<div class="top-bar">
  <div class="tabs-container" id="tabs"></div>
  <div class="search-container">
    <input type="text" id="search" placeholder="Search MCU movies...">
  </div>
  <div id="progress">Loading...</div>
</div>

<div class="container" id="list"></div>

<script>
const SHEET_IDS = {
  chronological: "https://docs.google.com/spreadsheets/d/1Xfe--9Wshbb3ru0JplA2PnEwN7mVawazKmhWJjr_wKs/gviz/tq?tqx=out:json&sheet=Chronological%20Order",
  releaseOrder: "https://docs.google.com/spreadsheets/d/1Xfe--9Wshbb3ru0JplA2PnEwN7mVawazKmhWJjr_wKs/gviz/tq?tqx=out:json&sheet=Release%20Order",
  upcoming: "https://docs.google.com/spreadsheets/d/1Xfe--9Wshbb3ru0JplA2PnEwN7mVawazKmhWJjr_wKs/gviz/tq?tqx=out:json&sheet=Upcoming"
};

const TAB_CONFIG = [
  { id: 'chronological', label: 'Chronological Order', className: 'chronological' },
  { id: 'releaseOrder', label: 'Release Order', className: 'release-order' },
  { id: 'upcoming', label: 'Upcoming', className: 'upcoming' }
];

const OMDB_KEY = "98416621";

let watched = JSON.parse(localStorage.getItem("watched") || "{}");
let ratingCache = JSON.parse(localStorage.getItem("ratingCache") || "{}");
let allItems = [];
let currentTab = 'chronological';
/* Fetch Google Sheet */
async function fetchSheet(sheetUrl){
  const res = await fetch(sheetUrl);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));

  return json.table.rows
    .slice(0)
    .map((r, i) => {
      const titleCell = r.c[1];
      const dateCell = r.c[2];

      let title = titleCell?.v?.toString().trim();
      let link = null;

      if(titleCell?.f){
        const html = titleCell.f;

        const match = html.match(/href="([^"]+)"/);
        if(match && match[1]){
          link = match[1];
        }

        if(!link){
          const urlMatch = html.match(/https?:\/\/[^\s"]+/);
          if(urlMatch) link = urlMatch[0];
        }
      }

      let date = dateCell?.v;

      if(dateCell && dateCell.f){
        date = dateCell.f;
      }

      if(title){
        return { 
          title, 
          date, 
          link,
          index: i + 1
        };
      }
    })
    .filter(Boolean);
}

/* Format date */
function formatDate(date){
  if(!date) return "Unknown";

  let d;

  if(typeof date === "string"){
    d = new Date(date);
  } else if(typeof date === "number"){
    d = new Date(Math.round((date - 25569) * 86400 * 1000));
  }

  if(!d || isNaN(d)) return "Unknown";

  const day = d.getDate();
  const month = d.getMonth() + 1;
  const year = d.getFullYear();

  return `${day} - ${month} - ${year}`;
}

/* OMDb rating */
async function getRating(title){
  if(ratingCache[title]){
    return ratingCache[title];
  }

  try{
    const res = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${OMDB_KEY}`);
    const data = await res.json();

    let rating = "N/A";

    if(data && data.Response === "True"){
      rating = data.imdbRating || "N/A";
    }

    ratingCache[title] = rating;
    localStorage.setItem("ratingCache", JSON.stringify(ratingCache));

    return rating;

  } catch(err){
    console.error(err);
    return "N/A";
  }
}

/* Render list */
function renderList(items){
  const container = document.getElementById("list");
  container.innerHTML = "";

  items.forEach(async (item) => {
    const { title, date, link, index } = item;

    const card = document.createElement("div");
    card.className = "card";

    const titleHTML = link
      ? `<a href="${link}" target="_blank">${title}</a>`
      : title;

    card.innerHTML = `
      <div>
        <div class="title">
          <span class="num">#${index}</span> ${titleHTML}
        </div>
        <div class="meta">📅 ${formatDate(date)}</div>
        <div class="rating">⭐ Loading...</div>
      </div>
      <input type="checkbox" class="checkbox" ${watched[title] ? "checked" : ""}>
    `;

    container.appendChild(card);

    const rating = await getRating(title);
    card.querySelector(".rating").innerText = `⭐ ${rating}`;

    const checkbox = card.querySelector("input");
    checkbox.addEventListener("change", () => {
      watched[title] = checkbox.checked;
      localStorage.setItem("watched", JSON.stringify(watched));
      updateProgress();
    });
  });

  updateProgress();
}

/* Progress */
function updateProgress(){
  const total = allItems.length;
  const watchedCount = allItems.filter(i => watched[i.title]).length;

  document.getElementById("progress").innerHTML =
    `Watched: <strong>${watchedCount}/${total}</strong>`;
}

/* Search */
function setupSearch(){
  const search = document.getElementById("search");

  search.addEventListener("input", () => {
    const q = search.value.toLowerCase();
    const filtered = allItems.filter(i =>
      i.title.toLowerCase().includes(q)
    );
    renderList(filtered);
  });
}

/* Setup tabs */
function setupTabs(){
  const tabsContainer = document.getElementById("tabs");
  tabsContainer.innerHTML = "";

  TAB_CONFIG.forEach(tab => {
    const button = document.createElement("button");
    button.className = `tab ${tab.className}`;
    button.textContent = tab.label;
    
    if(tab.id === currentTab){
      button.classList.add("active");
    }

    button.addEventListener("click", () => switchTab(tab.id));
    tabsContainer.appendChild(button);
  });
}

/* Switch tab */
async function switchTab(tabId){
  currentTab = tabId;
  document.getElementById("search").value = "";
  
  setupTabs();
  
  const sheetUrl = SHEET_IDS[tabId];
  allItems = await fetchSheet(sheetUrl);
  renderList(allItems);
}

/* Init */
async function load(){
  setupTabs();
  const sheetUrl = SHEET_IDS[currentTab];
  allItems = await fetchSheet(sheetUrl);
  renderList(allItems);
  setupSearch();
}

load();
</script>

</body>
</html>
