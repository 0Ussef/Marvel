<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCU Watchlist</title>

<style>
:root{
  --primary:#FF365B7D;
  --bg:#0f1115;
  --card:#1a1d24;
  --text:#ffffff;
  --muted:#a9b0bb;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:16px;
  background:var(--primary);
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

.container{
  padding:10px;
}

.card{
  display:flex;
  justify-content:space-between;
  gap:12px;
  background:var(--card);
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  align-items:center;
}

.title{
  font-size:16px;
  font-weight:bold;
}

.checkbox{
  transform: scale(1.6);
}

.top-bar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<header>MCU Chronological Watchlist</header>

<div class="top-bar">
  <button onclick="loadList()">Refresh</button>
  <span id="status"></span>
</div>

<div class="container" id="list"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Xfe--9Wshbb3ru0JplA2PnEwN7mVawazKmhWJjr_wKs/gviz/tq?tqx=out:json&sheet=Chronological%20Order";

let watched = JSON.parse(localStorage.getItem("watched") || "{}");

async function fetchSheet(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  // Remove Google wrapper
  const json = JSON.parse(text.substring(47).slice(0, -2));

  const rows = json.table.rows;

  let list = [];

  rows.forEach((row, index) => {
    // Skip header row(s) if needed
    if(index < 1) return;

    const title = row.c[1]?.v; // Column B

    if(title){
      list.push(title.toString().trim());
    }
  });

  return list;
}

async function loadList(){
  const container = document.getElementById("list");
  const status = document.getElementById("status");

  container.innerHTML = "Loading...";
  status.innerText = "";

  try{
    const titles = await fetchSheet();

    container.innerHTML = "";

    titles.forEach(title => {
      const id = title;

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="title">${title}</div>
        <input type="checkbox" class="checkbox" ${watched[id] ? "checked" : ""}>
      `;

      const checkbox = card.querySelector("input");

      checkbox.addEventListener("change", () => {
        watched[id] = checkbox.checked;
        localStorage.setItem("watched", JSON.stringify(watched));
      });

      container.appendChild(card);
    });

    status.innerText = "Loaded " + titles.length + " entries";

  } catch(err){
    console.error(err);
    container.innerHTML = "Failed to load list";
    status.innerText = "Error loading data";
  }
}

loadList();
</script>

</body>
</html>
