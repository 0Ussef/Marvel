<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCU Watchlist</title>

<style>
:root{
  --bg:#0f1115;
  --card:#1a1d24;
  --text:#ffffff;
  --muted:#a9b0bb;
  --accent:#ff365b;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* Header */
header{
  padding:16px;
  background:var(--accent);
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

/* Top bar */
.top-bar{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

input[type="text"]{
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

/* Progress */
#progress{
  font-size:12px;
  color:var(--muted);
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap:12px;
  padding:10px;
}

/* Card */
.movie-card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  cursor:pointer;
  transition:transform 0.2s;
}

.movie-card:hover{
  transform:scale(1.03);
}

/* Poster */
.poster{
  width:100%;
  height:200px;
  object-fit:cover;
  background:#222;
}

/* Info */
.info{
  padding:8px;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.title{
  font-size:14px;
  font-weight:bold;
}

.small{
  font-size:12px;
  color:var(--muted);
}

/* Checkbox */
.checkbox{
  transform:scale(1.3);
  margin-top:6px;
}

/* Button */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<header>MCU Chronological Watchlist</header>

<div class="top-bar">
  <div class="top-row">
    <button onclick="loadList()">Refresh</button>
    <span id="progress"></span>
  </div>
  <input type="text" id="search" placeholder="Search MCU...">
</div>

<div class="grid" id="list"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Xfe--9Wshbb3ru0JplA2PnEwN7mVawazKmhWJjr_wKs/gviz/tq?tqx=out:json&sheet=Chronological%20Order";

let watched = JSON.parse(localStorage.getItem("watched") || "{}");
let posterCache = JSON.parse(localStorage.getItem("posterCache") || "{}");
let allTitles = [];

/* Fetch sheet */
async function fetchSheet(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));

  return json.table.rows
    .slice(1)
    .map(r => r.c[1]?.v?.toString().trim())
    .filter(Boolean);
}

/* Wikipedia poster fetch */
async function getPoster(title){

  if(posterCache[title]){
    return posterCache[title];
  }

  try{
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
    const res = await fetch(url);
    const data = await res.json();

    const poster = data.thumbnail?.source || null;

    posterCache[title] = poster;
    localStorage.setItem("posterCache", JSON.stringify(posterCache));

    return poster;

  } catch(err){
    console.error(err);
    return null;
  }
}

/* Render */
function renderList(titles){
  const container = document.getElementById("list");
  container.innerHTML = "";

  titles.forEach(async (title) => {

    const card = document.createElement("div");
    card.className = "movie-card";

    card.innerHTML = `
      <div style="height:200px; display:flex; align-items:center; justify-content:center;">
        Loading...
      </div>
    `;

    container.appendChild(card);

    const poster = await getPoster(title);

    card.innerHTML = `
      ${poster ? `<img src="${poster}" class="poster">` : `<div class="poster"></div>`}

      <div class="info">
        <div class="title">${title}</div>
        <label class="small">
          <input type="checkbox" class="checkbox" ${watched[title] ? "checked" : ""}>
          Watched
        </label>
      </div>
    `;

    const checkbox = card.querySelector("input");

    checkbox.addEventListener("change", () => {
      watched[title] = checkbox.checked;
      localStorage.setItem("watched", JSON.stringify(watched));
      updateProgress();
    });

  });

  updateProgress();
}

/* Progress */
function updateProgress(){
  const total = allTitles.length;
  const watchedCount = allTitles.filter(t => watched[t]).length;
  document.getElementById("progress").innerText = 
    `Watched: ${watchedCount} / ${total}`;
}

/* Search */
function setupSearch(){
  const search = document.getElementById("search");

  search.addEventListener("input", () => {
    const q = search.value.toLowerCase();

    const filtered = allTitles.filter(t =>
      t.toLowerCase().includes(q)
    );

    renderList(filtered);
  });
}

/* Load */
async function loadList(){
  const container = document.getElementById("list");
  container.innerHTML = "Loading...";

  allTitles = await fetchSheet();
  renderList(allTitles);
  setupSearch();
}

loadList();
</script>

</body>
</html>
