<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>MCU Watchlist</title>  

<style>  
:root{  
  --primary:#FF365B7D;  
  --bg:#0f1115;  
  --card:#1a1d24;  
  --text:#ffffff;  
  --muted:#a9b0bb;  
}  

body{  
  margin:0;  
  font-family: Arial, sans-serif;  
  background:var(--bg);  
  color:var(--text);  
}  

header{  
  padding:16px;  
  background:var(--primary);  
  font-size:20px;  
  font-weight:bold;  
  text-align:center;  
}  

.container{  
  padding:10px;  
}  

.card{  
  display:flex;  
  justify-content:space-between;  
  gap:12px;  
  background:var(--card);  
  padding:14px;  
  border-radius:12px;  
  margin-bottom:10px;  
  align-items:center;  
}  

.title{  
  font-size:16px;  
  font-weight:bold;  
}  

.checkbox{  
  transform: scale(1.6);  
}  

.top-bar{  
  display:flex;  
  justify-content:space-between;  
  padding:10px;  
}  

button{  
  padding:8px 12px;  
  border:none;  
  border-radius:8px;  
  background:var(--primary);  
  color:white;  
  font-weight:bold;  
}  
</style>  
</head>  

<body>  

<header>MCU Chronological Watchlist</header>  

<div class="top-bar">  
  <button onclick="loadList()">Refresh</button>  
  <span id="status"></span>  
</div>  

<div class="container" id="list"></div>  

<script>  
const SOURCE_URL = "https://marvelcinematicuniverse.fandom.com/wiki/Chronological_Order/Viewing_Timeline";  
const PROXY = "https://api.allorigins.win/raw?url=";  

let watched = JSON.parse(localStorage.getItem("watched") || "{}");  

async function fetchFandomList(){  
  const res = await fetch(PROXY + encodeURIComponent(SOURCE_URL));  
  const html = await res.text();  

  const parser = new DOMParser();  
  const doc = parser.parseFromString(html, "text/html");  

  const tables = doc.querySelectorAll("table.wikitable");  

  let list = [];  

  tables.forEach(table => {  
    const rows = table.querySelectorAll("tr");  

    rows.forEach(row => {  
      const cols = row.querySelectorAll("td");  

      if(cols.length >= 2){  
        const title = cols[0].innerText.trim();  

        if(title && !title.toLowerCase().includes("title")){  
          list.push(title);  
        }  
      }  
    });  
  });  

  return list;  
}  

async function loadList(){  
  const container = document.getElementById("list");  
  container.innerHTML = "Loading...";  

  try{  
    const titles = await fetchFandomList();  

    container.innerHTML = "";  

    titles.forEach(title => {  
      const id = title;  

      const card = document.createElement("div");  
      card.className = "card";  

      card.innerHTML = `  
        <div class="title">${title}</div>  
        <input type="checkbox" class="checkbox" ${watched[id] ? "checked" : ""}>  
      `;  

      const checkbox = card.querySelector("input");  

      checkbox.addEventListener("change", () => {  
        watched[id] = checkbox.checked;  
        localStorage.setItem("watched", JSON.stringify(watched));  
      });  

      container.appendChild(card);  
    });  

    document.getElementById("status").innerText = "Loaded " + titles.length + " entries";  

  } catch(err){  
    console.error(err);  
    document.getElementById("status").innerText = "Failed to load list";  
  }  
}  

loadList();  
</script>  

</body>  
</html>
